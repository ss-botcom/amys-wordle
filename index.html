<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Amy's Daily Wordle</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --latte:    #FDFBF7;  /* warm latte cream background     */
    --espresso: #3E2C23;  /* rich espresso brown             */
    --mocha:    #6B5142;  /* softer brown for secondary text */
    --lily:     #FFFFFF;  /* lily white                      */
    --sage:     #A8BBA0;  /* soft sage green  = correct      */
    --butter:   #E3C481;  /* warm buttery gold = present     */
    --taupe:    #C7BCB1;  /* muted taupe gray = absent       */
    --rose:     #D9A0A5;  /* gentle rose-pink accent         */
    --blushpk:  #F3D7DA;  /* pale petal pink                 */
    --border:   #E4DCD1;  /* light coffee-cream border       */
    --key:      #F1EAE0;  /* keyboard key resting color      */
  }

  html, body {
    background: var(--latte);
    color: var(--espresso);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
  }

  .font-display { font-family: 'Playfair Display', serif; }
  .font-script  { font-family: 'Great Vibes', cursive; }

  /* ---------- Page-load reveal ---------- */
  .rise { animation: rise 0.7s ease both; }
  .rise-1 { animation-delay: 0.05s; }
  .rise-2 { animation-delay: 0.18s; }
  .rise-3 { animation-delay: 0.32s; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Coffee steam ---------- */
  .steam path {
    opacity: 0;
    animation: steam-rise 2.8s ease-in-out infinite;
  }
  .steam path:nth-child(2) { animation-delay: 0.7s; }
  .steam path:nth-child(3) { animation-delay: 1.4s; }
  @keyframes steam-rise {
    0%   { opacity: 0;   transform: translateY(2px); }
    35%  { opacity: 0.8; }
    100% { opacity: 0;   transform: translateY(-4px); }
  }

  /* ---------- Lily sway ---------- */
  .lily-icon {
    animation: sway 5.5s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }

  /* ---------- Drifting lily petals (ambient background) ---------- */
  .petal {
    position: fixed;
    top: -4rem;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 30% 30%, var(--lily) 0%, var(--blushpk) 75%);
    border-radius: 65% 35% 60% 40% / 55% 45% 65% 35%;
    box-shadow: 0 1px 3px rgba(217, 160, 165, 0.15);
    animation: petal-fall linear infinite;
  }
  @keyframes petal-fall {
    0%   { transform: translateY(-6vh)  translateX(0)       rotate(0deg); }
    25%  { transform: translateY(26vh)  translateX(2.4rem)  rotate(75deg); }
    50%  { transform: translateY(52vh)  translateX(-1.6rem) rotate(160deg); }
    75%  { transform: translateY(78vh)  translateX(2rem)    rotate(235deg); }
    100% { transform: translateY(110vh) translateX(-1rem)   rotate(330deg); }
  }

  /* ---------- Victory petal burst ---------- */
  .burst {
    position: fixed;
    z-index: 45;
    pointer-events: none;
    border-radius: 65% 35% 60% 40% / 55% 45% 65% 35%;
    animation: burst 1.2s cubic-bezier(0.16, 0.6, 0.4, 1) forwards;
  }
  @keyframes burst {
    0%   { transform: translate(0, 0) rotate(0deg) scale(0.6); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1); opacity: 0; }
  }

  /* ---------- Tiles ---------- */
  .tile {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 6vw, 2rem);
    font-weight: 700;
    text-transform: uppercase;
    border: 2px solid var(--border);
    border-radius: 0.5rem;
    background: var(--lily);
    color: var(--espresso);
    user-select: none;
    box-shadow: 0 1px 2px rgba(62, 44, 35, 0.04);
    transition: transform 0.1s ease, border-color 0.15s ease;
  }
  .tile.filled {
    border-color: var(--mocha);
    animation: pop 0.12s ease;
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .tile.flip { animation: flip 0.55s ease forwards; }
  @keyframes flip {
    0%   { transform: rotateX(0deg); }
    50%  { transform: rotateX(90deg); }
    100% { transform: rotateX(0deg); }
  }
  .tile.correct { background: var(--sage);   border-color: var(--sage);   color: #FFFFFF; }
  .tile.present { background: var(--butter); border-color: var(--butter); color: #FFFFFF; }
  .tile.absent  { background: var(--taupe);  border-color: var(--taupe);  color: #FFFFFF; }

  .row.shake { animation: shake 0.45s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .tile.dance { animation: dance 0.5s ease; }
  @keyframes dance {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  /* ---------- Keyboard ---------- */
  .key {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: clamp(0.8rem, 3.2vw, 0.95rem);
    text-transform: uppercase;
    background: var(--key);
    color: var(--espresso);
    border-radius: 0.45rem;
    height: 3.4rem;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    transition: background 0.15s ease, color 0.15s ease, transform 0.05s ease;
    user-select: none;
  }
  .key:active { transform: scale(0.94); }
  .key.wide { flex: 1.6; font-size: 0.72rem; letter-spacing: 0.03em; }
  .key.correct { background: var(--sage);   color: #fff; }
  .key.present { background: var(--butter); color: #fff; }
  .key.absent  { background: var(--taupe);  color: #fff; }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed;
    top: 6.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--espresso);
    color: var(--latte);
    padding: 0.6rem 1.2rem;
    border-radius: 0.5rem;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 60;
  }
  #toast.show { opacity: 1; }

  /* ---------- Modal (love-note card) ---------- */
  #modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(62, 44, 35, 0.45);
    backdrop-filter: blur(3px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 50;
  }
  #modal-backdrop.show { opacity: 1; pointer-events: auto; }
  #modal-card {
    background: var(--lily);
    border: 1px solid var(--border);
    border-radius: 1rem;
    max-width: 26rem;
    width: 100%;
    padding: 2.25rem 2rem 1.75rem;
    text-align: center;
    box-shadow: 0 20px 50px rgba(62, 44, 35, 0.18);
    transform: translateY(14px) scale(0.98);
    transition: transform 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  #modal-backdrop.show #modal-card { transform: translateY(0) scale(1); }
  #modal-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--sage), var(--butter), var(--rose));
  }
  /* faint lily watermark behind the note */
  #modal-card::after {
    content: "";
    position: absolute;
    right: -2.5rem;
    bottom: -2.5rem;
    width: 11rem;
    height: 11rem;
    background: radial-gradient(ellipse at 30% 30%, var(--blushpk), transparent 70%);
    opacity: 0.5;
    pointer-events: none;
  }

  .divider-heart {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--rose);
    margin: 1.1rem 0;
  }
  .divider-heart::before, .divider-heart::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .signature {
    font-family: 'Great Vibes', cursive;
    font-size: 1.7rem;
    color: var(--rose);
    margin-top: 1rem;
    line-height: 1;
  }

  @media (prefers-reduced-motion: reduce) {
    .tile.flip, .tile.filled, .tile.dance, .row.shake,
    .rise, .steam path, .lily-icon, .petal, .burst { animation: none !important; }
    .rise { opacity: 1; }
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- ============ HEADER ============ -->
  <header class="w-full border-b relative z-10 rise rise-1" style="border-color: var(--border); background: rgba(253,251,247,0.92);">
    <div class="max-w-lg mx-auto flex items-center justify-center gap-3.5 py-4 px-4">
      <!-- Coffee cup with rising steam -->
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--mocha)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <g class="steam">
          <path d="M8 7c.6-.9-.6-1.7 0-2.8"/>
          <path d="M11.5 7c.6-.9-.6-1.7 0-2.8"/>
          <path d="M15 7c.6-.9-.6-1.7 0-2.8"/>
        </g>
        <path d="M17 10h1a3 3 0 0 1 0 6h-1"/>
        <path d="M4 10h13v5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-5z"/>
      </svg>

      <div class="text-center">
        <h1 class="font-display text-2xl sm:text-3xl font-semibold tracking-wide" style="color: var(--espresso);">Amy's Daily Wordle</h1>
        <p class="text-[0.7rem] uppercase tracking-[0.25em] mt-0.5" style="color: var(--rose);">a word a day, from me to you</p>
        <p id="today-line" class="text-[0.7rem] mt-1 font-medium" style="color: var(--mocha);"></p>
      </div>

      <!-- Swaying lily -->
      <svg class="lily-icon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--rose)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 22V10"/>
        <path d="M12 10C12 6 9 3 6 2c0 4 1.5 7 6 8z"/>
        <path d="M12 10c0-4 3-7 6-8 0 4-1.5 7-6 8z"/>
        <path d="M12 14c-1.5 1-4 1.2-6 .5 1.2 2.4 3.8 3.5 6 2.5"/>
        <path d="M12 14c1.5 1 4 1.2 6 .5-1.2 2.4-3.8 3.5-6 2.5"/>
      </svg>
    </div>
  </header>

  <!-- ============ TOAST ============ -->
  <div id="toast" role="status"></div>

  <!-- ============ GAME ============ -->
  <main class="flex-1 w-full max-w-lg mx-auto flex flex-col items-center justify-between px-3 py-4 gap-4 relative z-10">
    <div id="board" class="grid grid-rows-6 gap-1.5 w-full max-w-[21rem] rise rise-2" aria-label="game board"></div>
    <div id="keyboard" class="w-full max-w-[32rem] flex flex-col gap-1.5 pb-2 rise rise-3" aria-label="on-screen keyboard"></div>
  </main>

  <!-- ============ MODAL ============ -->
  <div id="modal-backdrop">
    <div id="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <p class="text-[0.65rem] uppercase tracking-[0.3em] mb-2" style="color: var(--mocha);">Amy's Daily Wordle</p>
      <h2 id="modal-title" class="font-display text-3xl font-semibold mb-1" style="color: var(--espresso);"></h2>
      <p id="modal-word" class="font-display italic text-xl" style="color: var(--rose);"></p>

      <div class="divider-heart" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--rose)"><path d="M12 21s-7.5-4.8-10-9.3C.4 8.6 2.4 5 5.8 5c2 0 3.4 1.1 4.2 2.4h4c.8-1.3 2.2-2.4 4.2-2.4 3.4 0 5.4 3.6 3.8 6.7C19.5 16.2 12 21 12 21z" transform="scale(0.9) translate(1.3,1.3)"/></svg>
      </div>

      <p id="modal-message" class="text-[0.95rem] leading-relaxed relative z-10" style="color: var(--mocha);"></p>

      <p class="signature">with all my love</p>

      <p class="mt-4 text-xs" style="color: var(--taupe);">Next word in <span id="countdown" class="font-semibold" style="color: var(--mocha);"></span></p>

      <button id="modal-close" class="mt-4 px-6 py-2.5 rounded-full text-sm font-semibold transition hover:opacity-90 relative z-10"
              style="background: var(--espresso); color: var(--latte);">
        See the board
      </button>
    </div>
  </div>

<script>
/* ==========================================================================
   AMY'S DAILY WORDLE — word calendar
   ==========================================================================
   HOW IT WORKS:
   - Keys are "MM-DD" (perpetual calendar — the same word repeats each year,
     so a fully filled calendar runs forever).
   - `word` must be exactly 5 letters. Guesses aren't dictionary-checked,
     so invented words are fine too.
   - `message` is the note revealed in the pop-up when the round ends.
   - Any date not listed below automatically falls back to FALLBACK_WORDS,
     so the game never breaks.
   - Currently filled: July 21 through January 16 (180 days — launch day is
     July 21 and Amy's birthday, July 24, is pinned). Add more any
     time using the same format:
     "MM-DD": { word: "XXXXX", message: "Your note to Amy here." },
   ========================================================================== */

const WORDS = {
  /* ================= JULY ================= */

  "07-26": { word: "GRACE", message: "You carry yourself with a grace I've never seen in anyone else. You make the hard things look easy and the easy things look beautiful. And it's your sisters name." },
  "07-27": { word: "FRESH", message: "Every day with you still feels fresh — like the first sip of morning coffee, like the first day we met. It never gets old. You never get old to me." },
  "07-28": { word: "SMILE", message: "Your smile is my favorite thing in the entire world. It has fixed more of my bad days than you will ever know." },
  "07-29": { word: "ANGEL", message: "You look out for me, you believe in me, you forgive me when I'm being ridiculous. If that's not an angel, I don't know what is." },
  "07-30": { word: "HEART", message: "You have the biggest heart of anyone I've ever met — and somehow you decided to share it with me. Awwww." },
  "07-31": { word: "SHINE", message: "You shine without even trying. In a classroom, in a kitchen, in a crowd — my eyes always find you first." },
  /* ================= AUGUST ================= */
  "08-01": { word: "BLOOM", message: "Like your favorite lilies, everything around you seems to bloom. Including me." },
  "08-02": { word: "PEACE", message: "Being with you is the calmest my mind ever gets. You are my quiet place in a loud world." },
  "08-03": { word: "DREAM", message: "You're the dream I didn't know I was allowed to have. Every plan I make for the future has you in it." },
  "08-04": { word: "LAUGH", message: "Nobody makes me laugh like you do. Half my camera roll is just moments I wanted to remember because we were laughing." },
  "08-05": { word: "BRAVE", message: "You're braver than you give yourself credit for. Watching you take on new things inspires me to be braver too." },
  "08-06": { word: "VIVID", message: "You make my world so vivid — every moment spent with you brings color into my life, and everything before you feels like it was in grayscale" },
  "08-07": { word: "LATTE", message: "You're the extra shot in my latte — I could technically function without you, but honestly, why would I ever want to?" },
  "08-08": { word: "PETAL", message: "Soft, delicate, and quietly the most beautiful part of the whole garden. Yes, this one was always going to be about you." },
  "08-09": { word: "ADORE", message: "I don't just love you, I adore you — the way you talk with your hands, the way you read menus twice, all of it." },

/* ========================= CORE GAME ========================= */
const ROWS = 6, COLS = 5;

const todayDate = new Date();
const mm = String(todayDate.getMonth() + 1).padStart(2, "0");
const dd = String(todayDate.getDate()).padStart(2, "0");

/* ---------- Hidden preview mode (for you, not for Amy) ----------
   Append ?peek=MM-DD to the URL to play any date, e.g.:
     index.html?peek=07-24   → birthday mode
     index.html?peek=12-25   → Christmas
   Add &fresh=1 to wipe that day's saved test progress and replay:
     index.html?peek=07-24&fresh=1
   Preview progress is stored under separate "test-" keys, so testing
   never locks or affects a real day. */
const params = new URLSearchParams(location.search);
const peek = params.get("peek");
const isPeek = !!(peek && /^(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])$/.test(peek));

const dateKey = isPeek ? peek : `${mm}-${dd}`;
const storageKey = (isPeek ? "test-" : "") + `amy-wordle-${todayDate.getFullYear()}-${dateKey}`;
if (isPeek && params.get("fresh")) {
  try { localStorage.removeItem(storageKey); } catch (e) {}
}

function getToday() {
  const entry = WORDS[dateKey];
  if (entry && entry.word && entry.word.trim().length === 5) {
    return { word: entry.word.toUpperCase(), message: entry.message };
  }
  const start = new Date(todayDate.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((todayDate - start) / 86400000);
  return FALLBACK_WORDS[dayOfYear % FALLBACK_WORDS.length];
}

const today = getToday();
const ANSWER = today.word.toUpperCase();

let currentGuess = "";
let gameOver = false;

/* ========================= KEYBOARD ========================= */
const KEY_ROWS = [
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["ENTER","Z","X","C","V","B","N","M","BACK"],
];
const keyboardEl = document.getElementById("keyboard");
const keyEls = {};

KEY_ROWS.forEach((keys) => {
  const rowEl = document.createElement("div");
  rowEl.className = "flex gap-1.5 w-full justify-center";
  keys.forEach((k) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "key" + (k.length > 1 ? " wide" : "");
    btn.textContent = k === "BACK" ? "⌫" : k;
    btn.setAttribute("aria-label", k === "BACK" ? "backspace" : k);
    btn.addEventListener("click", () => handleKey(k));
    rowEl.appendChild(btn);
    keyEls[k] = btn;
  });
  keyboardEl.appendChild(rowEl);
});

document.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "Enter") handleKey("ENTER");
  else if (e.key === "Backspace") handleKey("BACK");
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

/* ========================= INPUT ========================= */
function handleKey(k) {
  if (gameOver) return;
  if (k === "ENTER") return submitGuess();
  if (k === "BACK") {
    if (currentGuess.length > 0) {
      currentGuess = currentGuess.slice(0, -1);
      const t = boardTiles[currentRow][currentGuess.length];
      t.textContent = "";
      t.classList.remove("filled");
    }
    return;
  }
  if (currentGuess.length < COLS) {
    const t = boardTiles[currentRow][currentGuess.length];
    t.textContent = k;
    t.classList.remove("filled");
    void t.offsetWidth;
    t.classList.add("filled");
    currentGuess += k;
  }
}

/* ========================= EVALUATION ========================= */
function evaluate(guess, answer) {
  const result = new Array(COLS).fill("absent");
  const remaining = {};
  for (let i = 0; i < COLS; i++) {
    if (guess[i] === answer[i]) result[i] = "correct";
    else remaining[answer[i]] = (remaining[answer[i]] || 0) + 1;
  }
  for (let i = 0; i < COLS; i++) {
    if (result[i] === "correct") continue;
    if (remaining[guess[i]] > 0) {
      result[i] = "present";
      remaining[guess[i]]--;
    }
  }
  return result;
}

const RANK = { absent: 0, present: 1, correct: 2 };
function updateKeyStates(guess, result) {
  for (let i = 0; i < COLS; i++) {
    const L = guess[i], s = result[i];
    if (!keyStates[L] || RANK[s] > RANK[keyStates[L]]) keyStates[L] = s;
  }
  Object.entries(keyStates).forEach(([L, s]) => {
    if (keyEls[L]) {
      keyEls[L].classList.remove("correct", "present", "absent");
      keyEls[L].classList.add(s);
    }
  });
}

/* ========================= SUBMIT ========================= */
function submitGuess() {
  if (currentGuess.length < COLS) {
    showToast("Not enough letters, love ☕");
    boardEl.children[currentRow].classList.add("shake");
    setTimeout(() => boardEl.children[currentRow].classList.remove("shake"), 500);
    return;
  }

  const guess = currentGuess;
  const result = evaluate(guess, ANSWER);
  const row = boardTiles[currentRow];
  gameOver = true; // lock input during animation

  row.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add("flip");
      setTimeout(() => tile.classList.add(result[i]), 270);
    }, i * 300);
  });

  const totalDelay = COLS * 300 + 300;
  setTimeout(() => {
    updateKeyStates(guess, result);
    const won = guess === ANSWER;
    const rowIndexAtSubmit = currentRow;
    currentRow++;
    currentGuess = "";
    saveState(won ? "won" : currentRow >= ROWS ? "lost" : "playing");

    if (won) {
      row.forEach((tile, i) => setTimeout(() => tile.classList.add("dance"), i * 90));
      petalBurst();
      setTimeout(() => endGame(true, rowIndexAtSubmit + 1), 1000);
    } else if (currentRow >= ROWS) {
      setTimeout(() => endGame(false), 400);
    } else {
      gameOver = false;
    }
  }, totalDelay);
}

/* ========================= VICTORY PETAL BURST ========================= */
const BURST_COLORS = ["var(--sage)", "var(--butter)", "var(--rose)", "var(--blushpk)", "var(--lily)"];
function petalBurst() {
  if (reducedMotion) return;
  const rect = boardEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 26; i++) {
    const p = document.createElement("div");
    p.className = "burst";
    const size = 8 + Math.random() * 10;
    p.style.width = size + "px";
    p.style.height = size * 0.75 + "px";
    p.style.left = cx + "px";
    p.style.top = cy + "px";
    p.style.background = BURST_COLORS[i % BURST_COLORS.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 70 + Math.random() * 150;
    p.style.setProperty("--tx", Math.cos(angle) * dist + "px");
    p.style.setProperty("--ty", (Math.sin(angle) * dist - 60) + "px"); // bias upward
    p.style.setProperty("--rot", (Math.random() * 540 - 270) + "deg");
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1300);
  }
}

/* ========================= END / MODAL ========================= */
const WIN_TITLES = ["Genius!", "Brilliant!", "Wonderful!", "Beautiful!", "You did it!", "Just in time!"];

function endGame(won, attempt) {
  gameOver = true;
  const title = won ? WIN_TITLES[Math.min(attempt - 1, WIN_TITLES.length - 1)] : "The word was…";
  openModal(title);
}

const backdrop = document.getElementById("modal-backdrop");
function openModal(title) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-word").textContent = "“" + ANSWER + "”";
  document.getElementById("modal-message").textContent = today.message;
  backdrop.classList.add("show");
  startCountdown();
}
document.getElementById("modal-close").addEventListener("click", () => backdrop.classList.remove("show"));
backdrop.addEventListener("click", (e) => { if (e.target === backdrop) backdrop.classList.remove("show"); });

function startCountdown() {
  const el = document.getElementById("countdown");
  function tick() {
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    let s = Math.floor((next - now) / 1000);
    const h = String(Math.floor(s / 3600)).padStart(2, "0");
    const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
    const sec = String(s % 60).padStart(2, "0");
    el.textContent = `${h}:${m}:${sec}`;
  }
  tick();
  setInterval(tick, 1000);
}

/* ========================= TOAST ========================= */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ========================= PERSISTENCE ========================= */
function saveState(status) {
  const guesses = [];
  for (let r = 0; r < currentRow; r++) {
    guesses.push(boardTiles[r].map((t) => t.textContent).join(""));
  }
  try {
    localStorage.setItem(storageKey, JSON.stringify({ guesses, status }));
  } catch (e) { /* private browsing — game still works, just won't persist */ }
}

function restoreState() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(storageKey)); } catch (e) { return; }
  if (!saved || !Array.isArray(saved.guesses)) return;

  saved.guesses.forEach((guess, r) => {
    const result = evaluate(guess, ANSWER);
    boardTiles[r].forEach((tile, i) => {
      tile.textContent = guess[i];
      tile.classList.add(result[i]);
    });
    updateKeyStates(guess, result);
  });
  currentRow = saved.guesses.length;

  if (saved.status === "won") {
    gameOver = true;
    setTimeout(() => endGame(true, currentRow), 500);
  } else if (saved.status === "lost") {
    gameOver = true;
    setTimeout(() => endGame(false), 500);
  }
}

restoreState();
</script>
